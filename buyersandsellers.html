<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кузя вынос!</title>
    <link rel="stylesheet" href="assets\css\style.css">
</head>
<body onload="globalLoadBNSPage()">
    <header class="header">
        <nav class="nav">
            <a href="calculations.html" class="nav-item">Расчёты</a>
            <a href="division.html" class="nav-item">Подсчёт и разделение</a>
            <a href="buyersandsellers.html" class="nav-item">Скупщики или продавцы</a>
        </nav>
    </header>

    <div id="bns-page">
        <div id="container" oninput="globalSaveBNSPage()">
            <div id="bns-type">
                <p class="column-header">Тип</p>
                <div class="column-header" id="last-typ"></div>
                <button class="normal-button" onclick="addBNSRow(); globalSaveBNSPage()">+</button>
            </div>
            <div id="nicknames">
                <p class="column-header">Ник</p>
                <div class="column-header" id="last-nck"></div>
                <button class="normal-button" onclick="removeBNSRow(); globalSaveBNSPage()">-</button>
            </div>
            <div id="scam-attempts">
                <p class="column-header">Попытки скама</p>
                <div class="column-header" id="last-sca"></div>
            </div>
            <div id="succesful-trades">
                <p class="column-header">Успеш. обмены</p>
                <div class="column-header" id="last-sct"></div>
            </div>
            <div id="trust">
                <p class="column-header">Доверие</p>
                <div class="column-header" id="last-tru"></div>
            </div>
            <div id="notes">
                <p class="column-header-wide">Заметки</p>
                <div class="column-header-wide" id="last-nts"></div>
            </div>
            <div></div>
        </div>
    </div>

    <script src="assets\js\main.js"></script>
</body>
</html>
