<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кузя вынос!</title>
    <link rel="stylesheet" href="assets\css\base.css">
    <link rel="stylesheet" media="screen and (max-width: 767px)" href="assets\css\mobile.css">
</head>
<body onload="globalLoadDivPage()">
    <header class="header">
        <nav class="nav">
            <a href="calculations.html" class="nav-item small-text">Расчёты</a>
            <a href="division.html" class="nav-item small-text">Подсчёт и разделение</a>
            <a href="buyersandsellers.html" class="nav-item small-text">Скупщики или продавцы</a>
            <a href="contest.html" class="nav-item small-text">Конкурсы</a>
        </nav>
    </header>
    </div>

    <div id="division-page">
        <div id="container" oninput="globalSaveDivPage(); calculateDivPage()">
            <div id="item-names-d">
                <p class="column-header">Предмет</p>
                <div class="column-header" id="last-itn"></div>
                <button class="normal-button" onclick="addTotalRow(); globalSaveDivPage()">+</button>
            </div>
            <div id="profit">
                <p class="column-header">Заработок</p>
                <div class="column-header" id="last-prf"></div>
                <button class="normal-button" onclick="removeTotalRow(); globalSaveDivPage()">-</button>
            </div>
            <div id="div-col-1">
                <p class="column-header">Сумма</p>
                <input class="normal-out-cell" id="total-sum" disabled>
                <p class="column-header-xwide">Разделение на группу</p>
                <p class="column-header">Доля</p>
                <div class="column-header" id="last-prt"></div>
                <button class="normal-button" onclick="addPartsRow(); globalSaveDivPage(); calculateDivPage()">+</button>
            </div>
            <div id="div-col-2">
                <p class="column-header small-text">Сумма + ком.</p>
                <input class="normal-out-cell" id="total-sum-fee" disabled>
                <div class="column-header"></div>
                <p class="column-header small-text">% от суммы</p>
                <div class="column-header" id="last-prc"></div>
                <button class="normal-button" onclick="removePartsRow(); globalSaveDivPage(); calculateDivPage()">-</button>
            </div>
            <div id="div-col-3">
                <p class="column-header small-text">Комиссия (%)</p>
                <input class="normal-in-cell" id="fee">
                <div class="column-header"></div>
                <p class="column-header">Поровну</p>
                <input type="checkbox" class="normal-in-cell checkbox" id="divp-eqp">
                <p class="column-header small-text">Сумма проц.</p>
                <input type="text" class="normal-out-cell" id="perc-sum" disabled>
            </div>
        </div>
    </div>

    <script src="assets\js\main.js"></script>
</body>
</html>
