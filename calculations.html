<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кузя вынос!</title>
    <link rel="stylesheet" href="assets\css\base.css">
    <link rel="stylesheet" media="screen and (max-width: 767px)" href="assets\css\mobile.css">
</head>
<body onload="globalLoadCalcPage()">
    <header class="header">
        <nav class="nav">
            <a href="calculations.html" class="nav-item small-text">Расчёты</a>
            <a href="division.html" class="nav-item small-text">Подсчёт и разделение</a>
            <a href="buyersandsellers.html" class="nav-item small-text">Скупщики или продавцы</a>
            <a href="contest.html" class="nav-item small-text">Конкурсы</a>
        </nav>
    </header>

    <div id="calculations-page">
        <div id="container" oninput="updatePrices(); globalSaveCalcPage()">
            <div id="item-names">
                <p class="column-header">Предмет</p>
                <div class="column-header" id="last-itn"></div>
                <button class="normal-button" onclick="addPriceRow(); globalSaveCalcPage()">+</button>
            </div>
            <div id="cost-per-piece">
                <p class="column-header">Цена за шт</p>
                <div class="column-header" id="last-cpp"></div>
                <button class="normal-button" onclick="removePriceRow(); globalSaveCalcPage()">-</button>
            </div>
            <div id="amount">
                <p class="column-header">Кол-во</p>
                <div class="column-header" id="last-amt"></div>
            </div>
            <div id="price-for-items">
                <p class="column-header">Стоимость</p>
                <p id="last-pri" class="column-header">Сумма</p>
                <input id="price-sum" class="normal-out-cell" disabled="true">
            </div>
            <div id="use-items">
                <p class="column-header">Считать</p>
                <div class="column-header" id="last-usi"></div>
            </div>
        </div>
    </div>

    <script src="assets\js\main.js"></script>
</body>
</html>
